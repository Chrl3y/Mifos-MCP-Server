# Production override for DigitalOcean Droplet
# Usage:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Differences from base:
#  - dashboard NEXT_PUBLIC_API_URL points to the public droplet URL (not localhost)
#  - mcp-server not started (it runs locally via Claude Code)
#  - Logging driver set to local with rotation so disk doesn't fill up

services:
  mcp-server:
    profiles: ["local-only"]   # excluded from default `docker compose up`

  webhook-server:
    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"

  dashboard:
    environment:
      # Point to the public Droplet IP/domain so API calls work from the browser
      - NEXT_PUBLIC_API_URL=${PUBLIC_URL:-http://localhost:4000}
    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"
