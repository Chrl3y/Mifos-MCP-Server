name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build static export
        working-directory: dashboard
        env:
          NEXT_PUBLIC_DEMO_MODE: "true"
          BASE_PATH: /Mifos-MCP-Server
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# ─────────────────────────────────────────────────────────────────────────────
# HOW TO ACTIVATE GITHUB PAGES DEPLOYMENT:
#
# 1. Go to https://github.com/settings/tokens/new
#    Scopes: check "repo" + "workflow" → Generate token
#
# 2. Run:
#      mkdir -p .github/workflows
#      cp docs/deploy-pages.workflow.yml .github/workflows/deploy-pages.yml
#      git add .github/
#      git commit -m "ci: enable GitHub Pages deployment"
#      git push origin main   # use new token
#
# 3. In GitHub repo → Settings → Pages → Source → "GitHub Actions"
#
# Dashboard will be live at: https://chrl3y.github.io/Mifos-MCP-Server
# ─────────────────────────────────────────────────────────────────────────────
