version: "3.9"
services:
  mcp-server:
    build: .
    container_name: mifos-system-doctor
    restart: unless-stopped
    stdin_open: true
    tty: true
    env_file: .env
    volumes:
      - ./src/config:/app/src/config   # live-reload config without rebuild

  webhook-server:
    build: .
    container_name: mifos-webhook-server
    command: node dist/webhook-server/index.js
    restart: unless-stopped
    ports:
      - "${WEBHOOK_PORT:-4000}:4000"
    env_file: .env

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: mifos-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3001}:3001"
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://webhook-server:4000
